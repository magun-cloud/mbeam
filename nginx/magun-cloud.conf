# Magun Beam – nginx config for magun.cloud
# Requires: wildcard SSL cert for *.magun.cloud
# Recommended: certbot with DNS challenge
#   certbot certonly --dns-cloudflare -d '*.magun.cloud' -d 'magun.cloud'

# Redirect bare HTTP → HTTPS
server {
    listen 80;
    server_name *.magun.cloud magun.cloud;
    return 301 https://$host$request_uri;
}

# Tunnel WebSocket endpoint — wss://tunnel.magun.cloud/tunnel
server {
    listen 443 ssl;
    server_name tunnel.magun.cloud;

    ssl_certificate     /etc/letsencrypt/live/magun.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/magun.cloud/privkey.pem;

    location /tunnel {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;  # keep WS alive for 24h
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
}

# Wildcard tunnel traffic — https://<subdomain>.magun.cloud
server {
    listen 443 ssl;
    server_name ~^(?P<subdomain>.+)\.magun\.cloud$;

    ssl_certificate     /etc/letsencrypt/live/magun.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/magun.cloud/privkey.pem;

    # Pass full original Host header so the Node server can resolve the subdomain
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;

    # Support WebSocket upgrade through tunnels too
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Don't buffer — stream responses back immediately
    proxy_buffering    off;
    proxy_read_timeout 60s;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
